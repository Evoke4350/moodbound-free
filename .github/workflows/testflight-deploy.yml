name: TestFlight Deploy

on:
  push:
    branches: [main]
    paths-ignore: ['*.md', 'LICENSE', 'BACKLOG.md']
  workflow_dispatch:

concurrency:
  group: testflight-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tuist
        run: brew install tuist

      # --- Decode secrets into temp files ---

      - name: Decode ASC API key
        run: |
          mkdir -p "$RUNNER_TEMP/secrets"
          echo "${{ secrets.ASC_PRIVATE_KEY }}" | base64 --decode > "$RUNNER_TEMP/secrets/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/secrets/AuthKey.p8"

      - name: Decode distribution certificate
        run: |
          echo "${{ secrets.DIST_CERT_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/secrets/dist.p12"

      # --- Set up temporary keychain ---

      - name: Create keychain and import certificate
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          # Create a new keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Append it to the search list and make it default
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          # Unlock and prevent auto-lock during the build
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 1800 "$KEYCHAIN_PATH"

          # Import the distribution certificate
          security import "$RUNNER_TEMP/secrets/dist.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the keychain without prompting
          security set-key-partition-list -S "apple-tool:,apple:,codesign:" \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # --- Build number ---

      - name: Set build number
        run: |
          NEW_BUILD=${{ github.run_number }}
          echo "BUILD_NUMBER=$NEW_BUILD" >> "$GITHUB_ENV"
          sed -i '' "s/\"CFBundleVersion\": *\.string(\"[0-9]*\")/\"CFBundleVersion\": .string(\"$NEW_BUILD\")/" Project.swift
          echo "Build number: $NEW_BUILD"

      # --- Generate, archive, export, upload ---

      - name: Generate project
        run: tuist generate --no-open --path .

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p build
          xcodebuild \
            -workspace moodbound.xcworkspace \
            -scheme moodbound \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/moodbound.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/secrets/AuthKey.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            archive

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/moodbound.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/secrets/AuthKey.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file build/export/moodbound.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
          echo "Upload complete. Build $BUILD_NUMBER submitted to TestFlight."

      # --- Cleanup (always runs, even on failure) ---

      - name: Cleanup secrets and keychain
        if: always()
        run: |
          # Delete temp keychain
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
          # Remove secret files
          rm -rf "$RUNNER_TEMP/secrets"
